# Mono Gateway Development Kit (NXP LS1046A)
# https://mono.vision
#
# Boot: U-Boot booti (NOT EFI -- loader.efi broken on this SoC)
# Console: serial 115200 (headless, no video output)
# U-Boot lives on QSPI NOR -- not installed from SD card

export PRODUCT_KERNEL=GATEWAY
export PRODUCT_TARGET=arm64
export PRODUCT_ARCH=aarch64
export PRODUCT_WANTS_CROSS="aarch64-binutils qemu-user-static"
export PRODUCT_COMSPEED=115200
export HOSTNAME=mono-gateway
export ARM_FAT_SIZE="80m -b 32m"
# No PRODUCT_UEFI -- we boot via U-Boot booti, not EFI

# Artifacts directory (custom board modules, tools, configs)
MONO_GW_DEPS="${MONO_GW_DEPS:-${TOOLSDIR%/*}/opnsense-deps/dist}"

arm_install_uboot()
{
	# U-Boot is on QSPI NOR, not SD card.  We just need kernel.img
	# and DTB on the FAT boot partition for U-Boot to load via booti.

	local KERNEL_ELF="${STAGEDIR}/boot/kernel/kernel"

	# Convert ELF kernel to ARM64 Image format for U-Boot booti
	sh "${TOOLSDIR%/*}/opnsense-deps/mk-kernel-img.sh" \
	    "${KERNEL_ELF}" "${STAGEDIR}/boot/msdos/kernel.img"

	# Copy device tree binary
	mkdir -p ${STAGEDIR}/boot/msdos/dtb
	cp ${STAGEDIR}/boot/dtb/freescale/mono-gateway-dk.dtb \
	    ${STAGEDIR}/boot/msdos/dtb/

	# rc.conf.local must be written here (not in arm_hook) because
	# setup_xbase() deletes rc.conf.local after arm_hook runs.
	local MONO_GW_RCD="${TOOLSDIR%/*}/opnsense-deps/rc.d"
	if [ -f "${MONO_GW_RCD}/rc.conf.local" ]; then
		cat "${MONO_GW_RCD}/rc.conf.local" >> \
		    "${STAGEDIR}/etc/rc.conf.local"
	fi
}

arm_hook()
{
	local STAGEDIR=${1}

	# The generic arm_hook (extras.conf) already ran and set
	# primaryconsole=video.  Fix it: this board has no video.
	sed -i '' \
	    's|<primaryconsole>video</primaryconsole>|<primaryconsole>serial</primaryconsole>|' \
	    ${STAGEDIR}${CONFIG_XML}
	sed -i '' '/<secondaryconsole>/d' ${STAGEDIR}${CONFIG_XML}

	# Headless serial only (generic set -D for dual console)
	echo "-S${PRODUCT_COMSPEED} -h" > ${STAGEDIR}/boot.config

	# Serial console: auto-detect terminal size on login
	echo "resizewin" >> ${STAGEDIR}/root/.profile

	# --- Custom kernel modules ---
	for mod in cdx auto_bridge pf_notify fci sfpled lp5812 \
	    emc2302 ina2xx; do
		if [ -f "${MONO_GW_DEPS}/${mod}.ko" ]; then
			cp "${MONO_GW_DEPS}/${mod}.ko" \
			    "${STAGEDIR}/boot/modules/"
		fi
	done

	# --- Userspace tools ---
	for bin in cmm cmmctl dpa_app fmc fand; do
		if [ -f "${MONO_GW_DEPS}/${bin}" ]; then
			cp "${MONO_GW_DEPS}/${bin}" \
			    "${STAGEDIR}/usr/local/sbin/"
			chmod 755 "${STAGEDIR}/usr/local/sbin/${bin}"
		fi
	done

	# --- PCD/CDX configuration ---
	local MONO_GW_CONFIG="${TOOLSDIR%/*}/opnsense-deps/config"
	if [ -d "${MONO_GW_CONFIG}" ]; then
		cp "${MONO_GW_CONFIG}/cdx_cfg.xml" "${STAGEDIR}/etc/"
		cp "${MONO_GW_CONFIG}/cdx_pcd.xml" "${STAGEDIR}/etc/"
		cp "${MONO_GW_CONFIG}/cdx_sp.xml" "${STAGEDIR}/etc/"
		mkdir -p "${STAGEDIR}/etc/fmc/config"
		cp "${MONO_GW_CONFIG}/hxs_pdl_v3.xml" \
		    "${STAGEDIR}/etc/fmc/config/"
	fi

	# --- rc.d boot scripts ---
	local MONO_GW_RCD="${TOOLSDIR%/*}/opnsense-deps/rc.d"
	mkdir -p "${STAGEDIR}/usr/local/etc/rc.d"
	for script in cmm fand; do
		if [ -f "${MONO_GW_RCD}/${script}" ]; then
			cp "${MONO_GW_RCD}/${script}" \
			    "${STAGEDIR}/usr/local/etc/rc.d/"
			chmod 755 \
			    "${STAGEDIR}/usr/local/etc/rc.d/${script}"
		fi
	done

	# --- rc.syshook early script (kernel module loading) ---
	# OPNsense ignores FreeBSD's kld rc.d service and rcorder
	# BEFORE:NETWORKING.  Use rc.syshook.d/early/ to load modules
	# before interfaces come up (cdx calls dpa_app internally).
	mkdir -p "${STAGEDIR}/usr/local/etc/rc.syshook.d/early"
	for hook in 01-growfs 02-mono-modules; do
		if [ -f "${MONO_GW_RCD}/${hook}" ]; then
			cp "${MONO_GW_RCD}/${hook}" \
			    "${STAGEDIR}/usr/local/etc/rc.syshook.d/early/"
			chmod 755 \
			    "${STAGEDIR}/usr/local/etc/rc.syshook.d/early/${hook}"
		fi
	done
}
